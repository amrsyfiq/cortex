# ===========================================================================
# Deploy — on every push to main: build BOTH images for x86_64 (the EC2 arch),
# push them to GHCR, then SSH into EC2 to pull and restart the stack.
#
# Secrets this needs (Settings → Secrets and variables → Actions):
#   EC2_HOST     public IP or DNS of the EC2 box
#   EC2_USER     ssh user (ubuntu, for an Ubuntu AMI)
#   EC2_SSH_KEY  the PRIVATE half of the keypair the box accepts
# GHCR auth uses the built-in GITHUB_TOKEN — no secret needed.
# ===========================================================================
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: # adds a "Run workflow" button for manual deploys

permissions:
  contents: read
  packages: write # lets GITHUB_TOKEN push images to GHCR

env:
  REGISTRY: ghcr.io
  # GHCR requires a lowercase owner. Matches REGISTRY in docker-compose.prod.yml.
  IMAGE_PREFIX: ghcr.io/amrsyfiq

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GitHub's runners are x86_64, so this is a fast NATIVE amd64 build — the
      # arch that matches the EC2 free-tier box (no slow emulation needed).
      - name: Build & push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/cortex-api:latest
            ${{ env.IMAGE_PREFIX }}/cortex-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/cortex-web:latest
            ${{ env.IMAGE_PREFIX }}/cortex-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      # SSH in and roll the stack forward. The box already has the repo checked
      # out at ~/app and a real .env.prod (created once, by hand). `git pull`
      # picks up any compose/Caddyfile changes; `pull` fetches the new images;
      # `up -d` recreates only what changed; `prune` reclaims old image layers.
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/app
            git pull --ff-only
            docker compose -f docker-compose.prod.yml --env-file .env.prod pull
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
            docker image prune -f
